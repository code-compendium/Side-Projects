<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="normalize.css" />
		<link rel="stylesheet" href="style.css" />
		<script src="script.js" defer></script>
	</head>
	<body>
		<h1>Reaction Test</h1>

		<div id="game">
			<p id="instruction">Press start</p>
			<button id="startBtn">Start</button>
			<div id="traffic-lights">
				<img
					src="images/red-traffic-light.svg"
					id="left-light"
					alt="Left traffic light"
			/>
			<img
				src="images/red-traffic-light.svg"
				id="right-light"
				alt="Right traffic light"
			/>
		</div>
		<div id="scoreboard">
			<h2>Resultaten</h2>
			<p id="round-number">Ronde: 1/10</p>
			<ul id="results-list"></ul>
			<p id="average-score"></p>
		</div>
	</body>
</html>
